<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Chat Client with Video Calls</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Sidebar / Auth -->
  <div class="card" style="display: flex; flex-direction: column;">
    <!-- Login Block -->
    <div id="loginBlock">
      <h2>Login</h2>
      <input type="email" id="loginEmail" placeholder="Email" value="test@test.com">
      <input type="password" id="loginPassword" placeholder="Password" value="password123">
      <button onclick="login()">Login</button>
      <p style="text-align: center; font-size: 14px; margin-top: 10px; color: #94a3b8;">
        Don't have an account? <a href="#" onclick="toggleAuthBlock('register'); event.preventDefault();" style="color: #3b82f6; text-decoration: none; font-weight: 500;">Create Account</a>
      </p>
      <div id="authStatus" style="color: #ef4444; font-weight: bold; margin-bottom: 20px; text-align: center;"></div>
    </div>

    <!-- Register Block -->
    <div id="registerBlock" class="hidden">
      <h2>Create Account</h2>
      <input type="text" id="registerName" placeholder="Full Name">
      <input type="email" id="registerEmail" placeholder="Email">
      <input type="password" id="registerPassword" placeholder="Password">
      <button onclick="register()">Create Account</button>
      <p style="text-align: center; font-size: 14px; margin-top: 10px; color: #94a3b8;">
        Already have an account? <a href="#" onclick="toggleAuthBlock('login'); event.preventDefault();" style="color: #3b82f6; text-decoration: none; font-weight: 500;">Login</a>
      </p>
      <div id="registerStatus" style="color: #ef4444; font-weight: bold; margin-bottom: 20px; text-align: center;"></div>
    </div>

    <!-- Contacts Block -->
    <div id="contactsBlock" class="hidden" style="flex-grow: 1; display: flex; flex-direction: column; overflow: hidden;">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h2 style="margin: 0;">Chats</h2>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </div>
      <input type="text" id="searchInput" placeholder="Search contacts..." onkeyup="filterUsers()">
      <div id="contactsList" style="overflow-y: auto; flex-grow: 1; display: flex; flex-direction: column; gap: 8px; margin-top: 10px; padding-right: 5px;">
        <!-- Contacts injected here -->
      </div>
      <input type="hidden" id="targetId" value="">
    </div>
  </div>

  <!-- Chat Area -->
  <div class="chat-box">
    <!-- Chat Header -->
    <div id="chatHeader" style="display: none; padding: 18px 25px; background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(5px); border-bottom: 1px solid rgba(255,255,255,0.05); justify-content: space-between; align-items: center; border-top-left-radius: 20px; border-top-right-radius: 20px; z-index: 10;">
      <div style="font-weight: 600; font-size: 1.2rem; color: #f8fafc;" id="chatHeaderName">User</div>
      <div style="display: flex; gap: 12px;">
        <button class="call-btn" style="margin:0; padding: 10px 18px; background: rgba(59, 130, 246, 0.2); color: #60a5fa; box-shadow: none;" onclick="initiateCall(false)" title="Audio Call">📞</button>
        <button class="call-btn" style="margin:0; padding: 10px 18px; background: rgba(59, 130, 246, 0.2); color: #60a5fa; box-shadow: none;" onclick="initiateCall(true)" title="Video Call">📹</button>
      </div>
    </div>
    
    <div class="messages-container" id="messagesContainer">
      <div style="text-align: center; color: #888; margin-top: 20px;">Select a contact to start chatting</div>
    </div>
    <div class="typing-indicator" id="typingIndicator"></div>
    <div id="imagePreviewContainer" class="image-preview-container hidden">
      <img id="imagePreview" class="image-preview hidden" src="" alt="Preview">
      <video id="videoPreview" class="image-preview hidden" src="" controls></video>
      <audio id="audioPreview" class="hidden" src="" controls></audio>
      <button class="remove-preview" onclick="clearMediaSelection()" title="Remove Media">×</button>
    </div>
    <div id="recordingIndicator" class="recording-indicator">🎤 Recording... Click the mic again to Stop</div>
    <div class="input-area">
      <input type="file" id="msgImageFile" accept="image/*,video/*,audio/*" class="hidden" onchange="handleMediaSelection(event)">
      <button class="upload-btn" onclick="document.getElementById('msgImageFile').accept='image/*'; document.getElementById('msgImageFile').click()" title="Attach Image">📷</button>
      <button class="upload-btn" onclick="document.getElementById('msgImageFile').accept='video/*'; document.getElementById('msgImageFile').click()" title="Attach Video">🎥</button>
      <button class="upload-btn" id="recordBtn" onclick="toggleRecording()" title="Record Voice">🎤</button>
      <input type="text" id="msgContent" placeholder="Type a message..." oninput="handleTyping()">
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <!-- WebRTC Call Overlays -->
  <div id="incomingCallOverlay" class="overlay hidden">
    <div class="incoming-card">
      <div class="audio-avatar" style="margin: 0 auto 20px auto; animation: pulse 1.5s infinite;" id="incomingAvatar">U</div>
      <h2 id="incomingCallText">Incoming Call...</h2>
      <p style="color: #aaa; margin:0;" id="incomingCallType">Video Call</p>
      <div class="incoming-actions">
        <button class="accept-btn" onclick="acceptCall()" title="Accept">
          <svg fill="white" width="28" height="28" viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
        </button>
        <button class="end-btn" onclick="rejectCall()" title="Reject">
          <svg fill="white" width="28" height="28" viewBox="0 0 24 24"><path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08c-.18-.17-.29-.42-.29-.7 0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28-.79-.74-1.69-1.36-2.67-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div id="activeCallOverlay" class="overlay hidden">
    <div class="call-header">
      <h3 id="callStatusText">Calling...</h3>
    </div>
    
    <div class="video-container" id="videoContainer">
      <video id="remoteVideo" autoplay playsinline></video>
      <video id="localVideo" autoplay muted playsinline></video>
      <audio id="remoteAudio" autoplay></audio>
    </div>

    <div class="audio-container hidden" id="audioContainer">
      <div class="audio-avatar" id="audioAvatar">U</div>
    </div>

    <div class="call-controls">
      <button id="screenShareBtn" class="hidden" style="margin: 0; border: none; padding: 15px; border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; background: #0084ff; box-shadow: 0 4px 15px rgba(0, 132, 255, 0.4); cursor: pointer;" onclick="toggleScreenShare()" title="Screen Share">
        🖥️
      </button>
      <button class="end-btn" onclick="endCall()" title="End Call">
        <svg fill="white" width="28" height="28" viewBox="0 0 24 24"><path d="M12 9c-1.6 0-3.15.25-4.6.72v3.1c0 .39-.23.74-.56.9-.98.49-1.87 1.12-2.66 1.85-.18.18-.43.28-.7.28-.28 0-.53-.11-.71-.29L.29 13.08c-.18-.17-.29-.42-.29-.7 0-.28.11-.53.29-.71C3.34 8.78 7.46 7 12 7s8.66 1.78 11.71 4.67c.18.18.29.43.29.71 0 .28-.11.53-.29.71l-2.48 2.48c-.18.18-.43.29-.71.29-.27 0-.52-.11-.7-.28-.79-.74-1.69-1.36-2.67-1.85-.33-.16-.56-.5-.56-.9v-3.1C15.15 9.25 13.6 9 12 9z"/></svg>
      </button>
    </div>
  </div>

  <!-- Componentized Scripts -->
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="js/main.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/call.js"></script>
  <script src="js/socket.js"></script>
</body>
</html>
